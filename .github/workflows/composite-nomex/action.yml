name: "composite-nomex"
description: "Run Matlab tests without MEX files"

runs:

  using: "composite"

  steps:

  - name: Main Tests (>= R2024b)
    if: ${{ matrix.release >= 'R2024b' || matrix.release == 'latest-including-prerelease' }}
    uses: matlab-actions/run-build@v3
    with:
      tasks: test:main


  - name: Main Tests (< R2024b)
    if: ${{ matrix.release >= 'R2022b' && matrix.release < 'R2024b' }}
    uses: matlab-actions/run-build@v3
    with:
      tasks: test_main
      startup-options: -logfile ${{ matrix.release }}-${{ runner.os }}-test-main.log


# note: "source-folder" adds all subfolders to Matlab path
# https://github.com/matlab-actions/run-tests?tab=readme-ov-file#run-matlab-tests
  - name: Non-buildtool tests (< R2022b)
    if: ${{ matrix.release < 'R2022b' }}
    uses: matlab-actions/run-command@v3
    with:
      startup-options: -logfile ${{ matrix.release }}-${{ runner.os }}-test-main.log
      command: test_main


  - name: upload logfile
    if: ${{ failure() && hashFiles(matrix.release-runner.os-test-main.log) != '' }}
    uses: actions/upload-artifact@v7
    with:
      name: ${{ matrix.release }}-${{ runner.os }}-test-log
      path: ${{ matrix.release }}-${{ runner.os }}-test*.log
